<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《大棋局2》封面</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #0f0f23 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .book-wrapper {
            perspective: 2000px;
        }
        
        .book-cover {
            width: 420px;
            height: 600px;
            background: linear-gradient(145deg, #2c3e50 0%, #1a252f 100%);
            border-radius: 4px 12px 12px 4px;
            box-shadow: 
                -5px 0 15px rgba(0,0,0,0.3),
                0 20px 60px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
            transition: transform 0.5s ease;
        }
        
        .book-cover:hover {
            transform: rotateY(-5deg);
        }
        
        /* 书脊效果 */
        .book-spine {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 35px;
            background: linear-gradient(90deg, 
                #1a1a2e 0%, 
                #2c3e50 30%, 
                #1a1a2e 100%);
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        
        .book-spine::before {
            content: '大棋局2';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: rotate(-90deg) translate(-50%, -50%);
            transform-origin: center;
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            letter-spacing: 8px;
            white-space: nowrap;
        }
        
        /* 装饰图案 */
        .decoration-top, .decoration-bottom {
            position: absolute;
            left: 50px;
            right: 30px;
            height: 3px;
            background: linear-gradient(90deg, 
                rgba(231, 76, 60, 0.8) 0%, 
                rgba(231, 76, 60, 0.3) 50%,
                transparent 100%);
        }
        
        .decoration-top { top: 25px; }
        .decoration-bottom { bottom: 25px; }
        
        /* 版本标记 */
        .edition-badge {
            position: absolute;
            top: 20px;
            right: 25px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }
        
        /* 主要内容 */
        .cover-content {
            margin-left: 45px;
            padding: 80px 35px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        /* 棋盘图案 */
        .chess-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 30px;
            opacity: 0.25;
            background-image: 
                linear-gradient(45deg, #fff 25%, transparent 25%),
                linear-gradient(-45deg, #fff 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #fff 75%),
                linear-gradient(-45deg, transparent 75%, #fff 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        
        /* 主标题 */
        .main-title {
            font-size: 56px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 12px;
            margin-bottom: 5px;
            text-shadow: 0 2px 30px rgba(0,0,0,0.5);
        }
        
        .main-title .num {
            color: #e74c3c;
            font-size: 72px;
            display: inline-block;
            transform: translateY(5px);
        }
        
        .subtitle {
            font-size: 15px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 6px;
            line-height: 1.8;
            margin-bottom: 50px;
        }
        
        /* 作者信息 */
        .author-info {
            margin-bottom: 50px;
        }
        
        .author-label {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
            margin-bottom: 8px;
        }
        
        .author-name {
            font-size: 15px;
            color: rgba(255,255,255,0.9);
            letter-spacing: 4px;
        }
        
        /* 开始阅读按钮 */
        .read-btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 16px 50px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Noto Serif SC', serif;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(52, 152, 219, 0.4);
        }
        
        .read-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(52, 152, 219, 0.6);
        }
        
        /* 底部信息 */
        .footer-info {
            position: absolute;
            bottom: 35px;
            left: 50px;
            right: 30px;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
        }
        
        /* 响应式 */
        @media (max-width: 480px) {
            .book-cover {
                width: 95vw;
                max-width: 360px;
                height: auto;
                min-height: 520px;
            }
            
            .main-title { font-size: 42px; letter-spacing: 8px; }
            .main-title .num { font-size: 54px; }
            .subtitle { font-size: 13px; }
            .cover-content { padding: 60px 25px; }
        }
    </style>
</head>
<body>
    <div class="book-wrapper">
        <div class="book-cover">
            <div class="book-spine"></div>
            <div class="decoration-top"></div>
            <div class="edition-badge">第二版</div>
            
            <div class="cover-content">
                <div class="chess-icon"></div>
                
                <h1 class="main-title">大棋局<span class="num">2</span></h1>
                
                <p class="subtitle">
                    從1997到2026<br>
                    地緣政治的演變與重構
                </p>
                
                <div class="author-info">
                    <div class="author-label">續寫自布熱津斯基《大棋局》</div>
                    <div class="author-name">2026年3月</div>
                </div>
                
                <a href="./index.html" class="read-btn">開始閱讀</a>
            </div>
            
            <div class="decoration-bottom"></div>
            <div class="footer-info">
                約37萬字 · 七章 · 第二版
            </div>
        </div>
    </div>
</body>
</html>
